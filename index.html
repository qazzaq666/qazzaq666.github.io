<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css?family=Source+Code+Pro:400,200,700&display=swap"
      rel="stylesheet"
    />
    <link href="./css/main.css" rel="stylesheet" />
    <title>EM</title>
  </head>
  <body>
    <div class="entry-gate" id="entryGate">
      <div class="entry-panel">
        <p class="entry-title">EM</p>
        <p class="entry-text" id="entryText">Загрузка плеера...</p>
        <button
          class="entry-button"
          id="enterSiteButton"
          type="button"
          disabled
        >
          Войти на сайт
        </button>
      </div>
    </div>

    <div class="bg-orb bg-orb-left" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-right" aria-hidden="true"></div>
    <header class="topbar">
      <p class="status-table">The name of this site is under construction...</p>
      <span class="brand">EM</span>
    </header>
    <main class="page-main">
      <section class="hero" aria-labelledby="hero-caption">
        <a
          class="hero-link"
          href="https://youtu.be/kuNixp-wvWM?si=dzMo2SXwxvi-CydS"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Open linked video in a new tab"
        >
          <img
            src="kasane.webp"
            alt="Portrait artwork with a moody cinematic vibe"
            class="kasane-image"
          />
        </a>
        <p class="literally-me" id="hero-caption">Literally me</p>
      </section>

      <section class="echo-line" aria-label="Closing line">
        <p class="hello-text">Hello, is anyone there?</p>
      </section>
    </main>
    <footer class="page-footer">
      <span class="footer-year">© 2026 EM</span>
      <a href="./old/" class="footer-old-link">[old version]</a>
    </footer>
    <audio id="bgMusic" preload="auto" loop>
      <source src="./music.mp3" type="audio/mpeg" />
    </audio>
    <script src="./script.js"></script>
  </body>
</html>
